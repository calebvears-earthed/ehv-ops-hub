<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Authenticating… — EHV Ops Hub</title>
  <style>
    body {
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #F8F7F4;
      font-family: 'DM Sans', sans-serif;
      color: #374151;
    }
    .auth-msg {
      text-align: center;
      padding: 2rem;
    }
    .auth-msg h2 {
      font-family: 'Sora', sans-serif;
      color: #1B4332;
      margin-bottom: 0.5rem;
    }
    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid #E5E7EB;
      border-top-color: #2D6A4F;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 1rem auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="auth-msg">
    <h2>Authenticating…</h2>
    <div class="spinner"></div>
    <p>Connecting to Microsoft. This window will close automatically.</p>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/msal-browser@3.6.0/lib/msal-browser.min.js"></script>
  <script>
    (async () => {
      try {
        const msalConfig = {
          auth: {
            clientId: localStorage.getItem('ehv_settings')
              ? JSON.parse(localStorage.getItem('ehv_settings')).outlook?.clientId || ''
              : '',
            authority: `https://login.microsoftonline.com/${
              localStorage.getItem('ehv_settings')
                ? JSON.parse(localStorage.getItem('ehv_settings')).outlook?.tenantId || 'common'
                : 'common'
            }`,
            redirectUri: window.location.origin + '/auth-callback.html'
          },
          cache: { cacheLocation: 'localStorage' }
        };

        const msalInstance = new msal.PublicClientApplication(msalConfig);
        await msalInstance.initialize();
        await msalInstance.handleRedirectPromise();

        // Close popup or redirect back
        if (window.opener) {
          window.close();
        } else {
          window.location.href = 'index.html';
        }
      } catch (e) {
        console.error('Auth callback error:', e);
        document.querySelector('.auth-msg p').textContent =
          'Authentication failed. You can close this window and try again.';
        document.querySelector('.spinner').style.display = 'none';
      }
    })();
  </script>
</body>
</html>
