<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1B4332">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Energy — EHV Ops Hub</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="assets/icon-192.png">
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* ── Energy Module Styles ── */
    .nrg-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 28px; }
    .nrg-card {
      background: var(--surface-card); border-radius: var(--radius-lg);
      border: 1px solid var(--border); padding: 24px;
      box-shadow: var(--shadow-sm); transition: box-shadow var(--transition);
    }
    .nrg-card:hover { box-shadow: var(--shadow-md); }
    .nrg-card.full { grid-column: 1 / -1; }

    .nrg-section-label {
      font-family: var(--font-display); font-size: var(--text-xs);
      font-weight: 600; letter-spacing: .1em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 16px;
    }

    .nrg-card-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px;
    }
    .nrg-card-title {
      font-family: var(--font-display); font-size: var(--text-lg);
      font-weight: 700; color: var(--charcoal);
    }
    .nrg-card-badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 4px 10px; border-radius: 20px;
      font-family: var(--font-mono); font-size: var(--text-xs);
      font-weight: 600; letter-spacing: .02em;
    }
    .badge-purple { background: rgba(124,58,237,.1); color: var(--purple); }
    .badge-amber { background: var(--amber-tint); color: var(--amber-dim); }
    .badge-teal { background: rgba(13,148,136,.1); color: #0D9488; }
    .badge-green { background: var(--success-tint); color: var(--success); }

    /* Proposal table */
    .nrg-table-wrap { overflow-x: auto; }
    .nrg-table {
      width: 100%; border-collapse: collapse;
      font-family: var(--font-body); font-size: var(--text-sm);
    }
    .nrg-table thead {
      background: var(--border-light); border-bottom: 1px solid var(--border);
    }
    .nrg-table th {
      padding: 12px 14px; text-align: left; font-weight: 600;
      color: var(--muted); text-transform: uppercase; letter-spacing: .05em;
      font-size: var(--text-xs);
    }
    .nrg-table tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background var(--transition);
    }
    .nrg-table tbody tr:hover { background: var(--green-tint); }
    .nrg-table td {
      padding: 14px; color: var(--charcoal);
    }
    .nrg-table td:first-child { font-weight: 600; }
    .nrg-status {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 4px 10px; border-radius: 20px;
      font-family: var(--font-mono); font-size: var(--text-xs);
      font-weight: 600;
    }
    .status-quote { background: var(--amber-tint); color: var(--amber-dim); }
    .status-confirmed { background: var(--success-tint); color: var(--success); }

    /* Stat cards */
    .nrg-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }
    .nrg-stat {
      background: var(--surface-card); border-radius: var(--radius-lg);
      border: 1px solid var(--border); padding: 20px;
      text-align: center;
    }
    .nrg-stat-value {
      font-family: var(--font-display); font-size: var(--text-2xl);
      font-weight: 800; margin-bottom: 4px;
    }
    .nrg-stat-label {
      font-size: var(--text-xs); color: var(--muted);
      text-transform: uppercase; letter-spacing: .08em; font-weight: 600;
    }

    /* Intel cards */
    .nrg-intel-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .nrg-intel-card {
      padding: 16px; border-radius: var(--radius);
      border: 1px solid var(--border); transition: all var(--transition);
      background: var(--surface-card);
    }
    .nrg-intel-card:hover { border-color: var(--purple); box-shadow: var(--shadow-sm); }
    .nrg-intel-label {
      font-family: var(--font-display); font-size: var(--text-xs);
      font-weight: 600; text-transform: uppercase; letter-spacing: .08em;
      color: var(--muted); margin-bottom: 6px;
    }
    .nrg-intel-value {
      font-family: var(--font-display); font-size: var(--text-lg);
      font-weight: 700; color: var(--purple); margin-bottom: 4px;
    }
    .nrg-intel-note {
      font-size: var(--text-xs); color: var(--muted); line-height: 1.4;
    }

    /* Document list */
    .nrg-doc-list { list-style: none; }
    .nrg-doc-item {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 14px; border-radius: var(--radius);
      margin-bottom: 6px; transition: background var(--transition);
      cursor: pointer; text-decoration: none; color: inherit;
    }
    .nrg-doc-item:hover { background: var(--purple-tint); }
    .nrg-doc-icon {
      width: 36px; height: 36px; border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0;
    }
    .icon-pdf { background: rgba(220,38,38,.08); color: var(--danger); }
    .icon-docx { background: rgba(30,64,175,.08); color: var(--blue); }
    .icon-xlsx { background: rgba(22,163,74,.08); color: var(--success); }

    .nrg-doc-info { flex: 1; min-width: 0; }
    .nrg-doc-name {
      font-size: var(--text-sm); font-weight: 600; color: var(--charcoal);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .nrg-doc-meta {
      font-size: var(--text-xs); color: var(--muted);
    }
    .nrg-doc-arrow { color: var(--muted-light); font-size: var(--text-sm); }

    /* Tab nav */
    .nrg-tabs { display: flex; gap: 2px; margin-bottom: 24px; background: var(--border-light); border-radius: var(--radius); padding: 3px; }
    .nrg-tab {
      flex: 1; padding: 10px 16px; border: none; background: transparent;
      font-family: var(--font-display); font-size: var(--text-sm);
      font-weight: 600; color: var(--muted); cursor: pointer;
      border-radius: var(--radius-sm); transition: all var(--transition);
    }
    .nrg-tab:hover { color: var(--charcoal); }
    .nrg-tab.active { background: var(--surface-card); color: var(--charcoal); box-shadow: var(--shadow-sm); }

    /* Purple tint for energy accent */
    .nrg-header-accent { color: var(--purple); }

    /* Responsive */
    @media (max-width: 900px) {
      .nrg-grid { grid-template-columns: 1fr; }
      .nrg-stats { grid-template-columns: repeat(2, 1fr); }
      .nrg-intel-grid { grid-template-columns: 1fr; }
      .nrg-table { font-size: var(--text-xs); }
      .nrg-table th, .nrg-table td { padding: 10px; }
    }
    @media (max-width: 600px) {
      .nrg-stats { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="sidebar"></div>
    <div id="main-area">
      <div id="offline-banner" class="offline-banner">You're offline — showing cached data</div>
      <div id="topbar"></div>
      <div id="content"></div>
    </div>
  </div>
  <div id="modal-root"></div>

  <script src="js/data-service.js"></script>
  <script src="js/prompts.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/notifications.js"></script>
  <script>
    /* ═══════════════════════════════════════════════════
       EHV OPS HUB — Energy Module
       Battery & Solar Sales Pipeline Dashboard
       ═══════════════════════════════════════════════════ */

    const Energy = (() => {
      // ── Proposals ── (refreshed 27 Jun 2026 · active pipeline · 7 jobs)
      const PROPOSALS = [
        { code: 'EE-Q-0083', version: 'v8.2', client: 'Sue Morris', address: 'Adelaide metro', type: 'Solar + Battery', solar: '10.45kW', battery: '25kWh', stack: 'Trina 475W + GoodWe ESA AIO 1-ph', price: '$23,287', deposit: '$11,643.50', status: 'Sent', file: '../../333 energy/Proposals/EE-Q-0083 — Sue Morris — Proposal v8.2.pdf' },
        { code: 'EE-Q-0075', version: 'v8.1', client: 'Ken', address: 'Adelaide metro', type: 'Solar + Battery', solar: '10.45kW', battery: '25kWh', stack: 'Trina 475W + GoodWe ESA AIO 1-ph', price: '$19,888', deposit: '$9,944.00', status: 'Sent', file: '../../333 energy/Proposals/EE-Q-0075 — Ken — Proposal v8.1.pdf' },
        { code: 'EE-Q-0076', version: 'v10.0', client: 'Suzi & Glenn', address: 'Adelaide metro', type: 'Solar + Battery', solar: '10.45kW', battery: '50kWh', stack: 'Trina 475W + GoodWe ESA AIO 1-ph', price: '$33,888', deposit: '$16,944.00', status: 'Sent', file: '../../333 energy/Proposals/EE-Q-0076 — Suzi & Glenn — Proposal v10.0.pdf' },
        { code: 'EE-Q-GHAN', version: 'v2.1', client: 'David Ghan', address: '10 Jarvis St, Erindale', type: 'Solar + Battery + Whole-home Backup', solar: '13.775kW', battery: '50kWh', stack: 'Trina 475W + GoodWe ESA AIO + ATS 1-ph', price: '$33,333', deposit: '$16,666.50', status: 'Draft', file: '../../333 energy/Proposals/EE-Q-GHAN — David Ghan — Erindale — Proposal v2.1.pdf' },
        { code: 'EE-Q-0089', version: 'v1.2', client: 'Paul Lymbris', address: '33 Frederick St, Welland', type: 'Solar + Battery', solar: '13.3kW', battery: '33.28kWh', stack: 'Trina 475W + GoodWe ESA Hybrid + 4× Lynx F G2 (1-ph)', price: '$19,999', deposit: '$9,999.50', status: 'Refresh', file: '../../333 energy/Proposals/EE-Q-0089 — Paul Lymbris — Proposal v1.2.pdf' },
        { code: 'EE-Q-0090', version: 'v1.1', client: 'Rick Gibbs', address: '24 Gratwick Rd, Loxton', type: 'Battery Retrofit', solar: 'existing PV', battery: '33.28kWh', stack: 'GoodWe ESA Hybrid + 4× Lynx F G2 (1-ph)', price: '$13,333', deposit: '$6,666.50', status: 'New', file: '../../333 energy/Proposals/EE-Q-0090 — Rick Gibbs — Loxton — Proposal v1.1.pdf' },
        { code: 'EE-Q-0091', version: 'v1.1', client: 'Peter Charles', address: '18 Williamstown Rd, Sandy Creek', type: 'Solar + Battery (Mates)', solar: '12.21kW', battery: '6.4kWh', stack: 'Risen 370W (gifted) + Sungrow SH15T 3-ph + SBR064', price: '$5,581.40', deposit: '$2,790.70', status: 'Mates', file: '../../333 energy/Proposals/EE-Q-0091 — Peter Charles — Sandy Creek — Proposal v1.1.pdf' },
      ];

      // ── Documents ──
      const DOCUMENTS = [
        { name: 'Pipeline Punch Sheet (27 Jun 2026)', desc: '6-job pipeline overview · margins · deposits · contact register', icon: 'pdf', file: '../../333 energy/Proposals/EE-Punch-Sheet-2026-06-27.pdf' },
        { name: 'Product List · OSW Referenced (27 Jun 2026)', desc: 'Active gear stack · panel/inverter/battery OSW pricing · 7-job breakdown', icon: 'pdf', file: '../../333 energy/_Pricing/EE-Product-List-OSW-2026-06-27.pdf' },
        { name: 'EE Proposal Template — LOCKED', desc: 'Official cream/serif/purple aesthetic · benchmark for all customer-facing proposals', icon: 'pdf', file: '../../333 energy/_LOCKED-PROPOSAL-TEMPLATE/EE-Proposal-Template-OFFICIAL-LOCKED-2026-06-23.pdf' },
        { name: 'Sales Process Framework', desc: 'Turnkey quoting & installation guide for solar + battery', icon: 'pdf', file: '../../333 energy/Earthed Energy - Sales Process Framework.pdf' },
        { name: 'Proposal Email Template', desc: 'Standard email template for sending proposals', icon: 'docx', file: '../../333 energy/Earthed Energy - Proposal Email Template.docx' },
      ];

      // ── Market Intel ──
      const MARKET_INTEL = [
        { label: 'SA Retail Rate', value: '30–35c/kWh', note: 'Residential grid electricity' },
        { label: 'Feed-in Tariff', value: '5–8c/kWh', note: 'Solar export value (variable)' },
        { label: 'VPP Income Potential', value: '$500–$1,000+/yr', note: 'Virtual power plant participation' },
        { label: 'STC Rebate Deadline', value: '1 May 2026', note: 'Small-scale tech certificates expire' },
        { label: 'STC Factor Change', value: '8.4 → 6.8', note: '~19% rebate reduction (major change)' },
        { label: 'Battery Tiering', value: '0–14kWh = 100%', note: '14–28kWh = 60%, 28–50kWh = 15%' },
        { label: 'Target Postcodes', value: 'Eastern suburbs', note: 'Adelaide metro high-penetration areas' },
        { label: 'New VPP Scheme', value: 'SA Gov Q2 2026', note: 'Smart aggregation launch window' },
      ];

      function init() {
        render();
      }

      function render() {
        const content = document.getElementById('content');

        // Calculate stats
        const sentCount = PROPOSALS.filter(p => p.status === 'Sent' || p.status === 'Refresh').length;
        const pipelineValue = PROPOSALS
          .filter(p => p.price !== 'TBC')
          .reduce((sum, p) => sum + parseFloat(p.price.replace(/[^\d.]/g, '')), 0);
        const totalDeposits = PROPOSALS
          .filter(p => p.deposit && p.deposit !== 'TBC')
          .reduce((sum, p) => sum + parseFloat(p.deposit.replace(/[^\d.]/g, '')), 0);
        const avgQuoteValue = PROPOSALS.length > 0 ? Math.round(pipelineValue / PROPOSALS.length) : 0;

        content.innerHTML = `
          <!-- Stats Row -->
          <div class="nrg-stats">
            <div class="nrg-stat">
              <div class="nrg-stat-value" style="color: var(--purple);">${PROPOSALS.length}</div>
              <div class="nrg-stat-label">Active Jobs</div>
            </div>
            <div class="nrg-stat">
              <div class="nrg-stat-value" style="color: var(--amber);">$${(pipelineValue / 1000).toFixed(1)}K</div>
              <div class="nrg-stat-label">Pipeline Value (inc GST)</div>
            </div>
            <div class="nrg-stat">
              <div class="nrg-stat-value" style="color: var(--teal);">$${(totalDeposits / 1000).toFixed(1)}K</div>
              <div class="nrg-stat-label">Deposits Outstanding</div>
            </div>
            <div class="nrg-stat">
              <div class="nrg-stat-value" style="color: var(--success);">${sentCount}/${PROPOSALS.length}</div>
              <div class="nrg-stat-label">Sent / Refreshed</div>
            </div>
          </div>

          <!-- Tabs -->
          <div class="nrg-tabs">
            <button class="nrg-tab active" onclick="Energy.showTab('proposals')">Proposals</button>
            <button class="nrg-tab" onclick="Energy.showTab('documents')">Documents</button>
            <button class="nrg-tab" onclick="Energy.showTab('intel')">Market Intel</button>
          </div>

          <div id="nrg-tab-content"></div>
        `;

        showTab('proposals');
      }

      function showTab(tab) {
        document.querySelectorAll('.nrg-tab').forEach((el, i) => {
          el.classList.toggle('active', ['proposals','documents','intel'][i] === tab);
        });

        const container = document.getElementById('nrg-tab-content');

        if (tab === 'proposals') renderProposals(container);
        else if (tab === 'documents') renderDocuments(container);
        else if (tab === 'intel') renderIntel(container);
      }

      function renderProposals(container) {
        const statusClass = (s) => {
          const map = { 'Sent': 'status-confirmed', 'Refresh': 'badge-teal', 'Draft': 'status-quote', 'New': 'badge-amber', 'Mates': 'badge-purple' };
          return map[s] || 'status-quote';
        };
        container.innerHTML = `
          <div class="nrg-card full">
            <div class="nrg-card-header">
              <div class="nrg-card-title">Active Proposals · Click row to open PDF</div>
              <span class="nrg-card-badge badge-purple">${PROPOSALS.length} Jobs</span>
            </div>
            <div class="nrg-table-wrap">
              <table class="nrg-table">
                <thead>
                  <tr>
                    <th>Code</th>
                    <th>Client</th>
                    <th>Address</th>
                    <th>System</th>
                    <th>Stack</th>
                    <th>Price (inc GST)</th>
                    <th>Deposit 50%</th>
                    <th>Status</th>
                  </tr>
                </thead>
                <tbody>
                  ${PROPOSALS.map(p => `
                    <tr style="cursor: pointer;" onclick="window.open('${p.file}', '_blank')" title="Open ${p.code} ${p.version}">
                      <td style="font-family: var(--font-mono); font-size: var(--text-xs);">${p.code}<br><span style="color: var(--muted); font-weight: 400;">${p.version}</span></td>
                      <td>${p.client}</td>
                      <td style="font-size: var(--text-xs);">${p.address}</td>
                      <td>${p.solar ? p.solar + ' · ' : ''}${p.battery || ''}</td>
                      <td style="font-size: var(--text-xs); color: var(--muted);">${p.stack}</td>
                      <td style="font-family: var(--font-mono); font-weight: 700; color: var(--purple);">${p.price}</td>
                      <td style="font-family: var(--font-mono); font-size: var(--text-xs);">${p.deposit}</td>
                      <td><span class="nrg-status ${statusClass(p.status)}">${p.status}</span></td>
                    </tr>
                  `).join('')}
                </tbody>
              </table>
            </div>
          </div>
        `;
      }

      function renderDocuments(container) {
        container.innerHTML = `
          <div class="nrg-card full">
            <div class="nrg-card-header">
              <div class="nrg-card-title">Energy Document Library</div>
              <span class="nrg-card-badge badge-purple">${DOCUMENTS.length} Files</span>
            </div>
            <ul class="nrg-doc-list">
              ${DOCUMENTS.map(d => {
                const iconClass = d.icon === 'xlsx' ? 'icon-xlsx' : d.icon === 'docx' ? 'icon-docx' : 'icon-pdf';
                const iconEmoji = d.icon === 'xlsx' ? '📊' : d.icon === 'docx' ? '📝' : '📄';
                const ext = d.file.split('.').pop().toUpperCase();
                return `
                  <a href="${d.file}" target="_blank" class="nrg-doc-item" title="Open ${d.file}">
                    <div class="nrg-doc-icon ${iconClass}">${iconEmoji}</div>
                    <div class="nrg-doc-info">
                      <div class="nrg-doc-name">${d.name}</div>
                      <div class="nrg-doc-meta">${d.desc} · ${ext}</div>
                    </div>
                    <div class="nrg-doc-arrow">→</div>
                  </a>
                `;
              }).join('')}
            </ul>
          </div>
        `;
      }

      function renderIntel(container) {
        container.innerHTML = `
          <div class="nrg-card full" style="margin-bottom: 24px;">
            <div class="nrg-card-header">
              <div class="nrg-card-title nrg-header-accent">SA Energy Market Intel</div>
              <span class="nrg-card-badge badge-purple">Key Stats</span>
            </div>
            <p style="font-size: var(--text-sm); color: var(--muted); margin-bottom: 20px; line-height: 1.6;">
              Key market drivers and regulatory changes impacting battery & solar sales in South Australia.
              STC factor reduction on 1 May 2026 creates urgency — projects must be installed before this deadline.
            </p>
            <div class="nrg-intel-grid">
              ${MARKET_INTEL.map(i => `
                <div class="nrg-intel-card">
                  <div class="nrg-intel-label">${i.label}</div>
                  <div class="nrg-intel-value">${i.value}</div>
                  <div class="nrg-intel-note">${i.note}</div>
                </div>
              `).join('')}
            </div>
          </div>
        `;
      }

      return { init, showTab };
    })();

    document.addEventListener('DOMContentLoaded', () => {
      if (DataService.isFirstRun()) {
        window.location.href = 'settings.html?setup=1';
        return;
      }
      Nav.init('energy');
      Notifications.init();
      Energy.init();
    });
  </script>
</body>
</html>
