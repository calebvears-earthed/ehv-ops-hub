<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1B4332">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Calendar — EHV Ops Hub</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="assets/icon-192.png">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/msal-browser@3.6.0/lib/msal-browser.min.js"></script>
</head>
<body>
  <div id="app">
    <div id="sidebar"></div>
    <div id="main-area">
      <div id="offline-banner" class="offline-banner">You're offline — showing cached data</div>
      <div id="topbar"></div>
      <div id="content"></div>
    </div>
  </div>
  <div id="modal-root"></div>

  <script src="js/data-service.js"></script>
  <script src="js/prompts.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/outlook.js"></script>
  <script src="js/notifications.js"></script>
  <script src="js/calendar.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (DataService.isFirstRun()) {
        window.location.href = 'settings.html?setup=1';
        return;
      }
      Nav.init('calendar');
      Notifications.init();
      CalendarModule.init();
    });
  </script>
</body>
</html>
